<div class="reports-page flex flex-col gap-6 pb-24">

  <!-- Header -->
  <section class="reports-hero overflow-hidden rounded-[2rem] px-8 py-8 md:px-10 md:py-10">
    <div class="reports-hero__glow"></div>
    <div class="relative z-[1]">
      <span class="block text-[0.72rem] font-bold uppercase tracking-[0.36em] text-white/55 mb-3">
        Analítica
      </span>
      <h1 class="font-manrope text-[2.5rem] md:text-[3.2rem] font-black text-white tracking-[-0.05em] leading-[0.95]">
        Reportes
      </h1>
      <p class="mt-4 text-sm md:text-base leading-7 text-white/75 max-w-xl">
        Métricas de negocio, operación y productividad del salón.
      </p>
    </div>
  </section>

  <!-- Panel principal -->
  <section class="reports-panel rounded-[1.75rem] overflow-hidden">

    <!-- Tabs -->
    <div class="reports-tabs flex gap-2 p-4 border-b border-[rgba(88,35,34,0.08)]">
      <button
        *ngFor="let report of reports"
        type="button"
        class="reports-tab"
        [class.reports-tab--active]="selectedReportKey === report.key"
        (click)="selectReport(report.key)">
        <span class="material-symbols-outlined text-[1.1rem] leading-none" translate="no">
          {{ report.icon }}
        </span>
        <span>{{ report.title }}</span>
      </button>
    </div>

    <!-- Iframe -->
    <div class="reports-embed">
      <ng-container *ngIf="selectedReportUrl; else emptyState">
        <iframe
          [src]="selectedReportUrl"
          [title]="selectedReport.title"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </ng-container>

      <ng-template #emptyState>
        <div class="reports-empty flex flex-col items-center justify-center gap-4 text-center px-6">
          <span class="material-symbols-outlined text-[2.8rem] leading-none text-[#8b716d]" translate="no">
            bar_chart
          </span>
          <div class="max-w-sm">
            <h3 class="text-lg font-black tracking-[-0.03em] text-[#281110]">
              Reporte no disponible
            </h3>
            <p class="mt-2 text-sm leading-6 text-[#6f5f5d]">
              Este tablero aún no ha sido configurado.
            </p>
          </div>
        </div>
      </ng-template>
    </div>

  </section>

</div>
