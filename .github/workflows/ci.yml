name: CI/CD Pipeline
on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
env:
  NODE_VERSION: '20'
jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/test_db
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Generar cliente Prisma
        run: npx prisma generate
      - name: Build TypeScript
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Ejecutar migraciones
        run: npx prisma migrate deploy
      - name: Ejecutar tests
        run: npm test

  cd:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Deploy backend
        run: |
          curl -f -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}" || \
          (echo "Backend deploy failed" && exit 1)

      - name: Deploy frontend
        run: |
          curl -f -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" || \
          (echo "Frontend deploy failed" && exit 1)