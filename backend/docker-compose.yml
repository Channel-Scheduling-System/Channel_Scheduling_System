version: '3.8'

services:
    channel_mysql:
        image: mysql:8.0
        container_name: channel_mysql
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root123
            MYSQL_DATABASE: channel_db
            MYSQL_USER: admin
            MYSQL_PASSWORD: admin123
        ports:
            - '3306:3306'
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - channel-network

volumes:
    mysql_data:

networks:
    channel-network:
        driver: bridge
