# ─── Identificación del proyecto ─────────────────────────────────────────────
# IMPORTANTE: el valor de sonar.organization debe coincidir exactamente con la
# organización creada en https://sonarcloud.io al vincular la cuenta de GitHub.
sonar.organization=channel-scheduling-system
sonar.projectKey=Channel-Scheduling-System_Channel_Scheduling_System
sonar.projectName=Channel Scheduling System

# ─── Fuentes ─────────────────────────────────────────────────────────────────
sonar.sources=backend/src
sonar.tests=backend/tests
sonar.sourceEncoding=UTF-8

# ─── Exclusiones ─────────────────────────────────────────────────────────────
# Se excluyen los mismos archivos que en la configuración de Jest:
# repositorios, rutas, módulos, tipos, infraestructura, etc.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.repository.ts,\
  **/*.routes.ts,\
  **/*.module.ts,\
  **/index.ts,\
  **/*.types.ts,\
  **/*.d.ts,\
  backend/src/types/**,\
  backend/src/server.ts,\
  backend/src/app.ts,\
  backend/src/config/**,\
  backend/src/shared/services/email/nodemailer.service.ts,\
  backend/src/shared/services/email/templates/**,\
  backend/src/shared/services/email/index.ts,\
  backend/src/shared/constants/**,\
  frontend/**

sonar.test.exclusions=**/node_modules/**

# ─── Cobertura ────────────────────────────────────────────────────────────────
# Ruta al reporte LCOV generado por Jest (npm run test:coverage)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# ─── TypeScript ──────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=backend/tsconfig.json

# ─── Calidad ─────────────────────────────────────────────────────────────────
# El módulo de appointments está excluido de cobertura (mismo criterio que Jest).
# Los archivos de infraestructura/wiring siguen excluidos de cobertura via sonar.exclusions.
sonar.coverage.exclusions=\
  backend/src/modules/appointments/**,\
  backend/src/shared/middlewares/reset-pass.middleware.ts
