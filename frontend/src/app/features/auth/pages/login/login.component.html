<div class="page-wrapper">

  <div class="card card--animate">

    <div class="flex flex-col items-center gap-4 mb-10">
      <div class="logo-icon">
        <span class="material-symbols-outlined logo-icon__scissors">content_cut</span>
      </div>
      <div class="text-center">
        <h1 class="text-3xl font-black tracking-tight text-primary">Bienvenido</h1>
        <p class="text-sm font-medium mt-1 text-primary/70">Ingresa tus credenciales de acceso para iniciar sesión</p>
      </div>
    </div>

    <form  [formGroup]="loginForm" class="flex flex-col gap-6" (ngSubmit)="onSubmit()">

      <div class="flex flex-col gap-2">
        <label class="input-label">Alias, telefono o correo</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">person</span>
          <input
            class="input-field"
            placeholder="Ej: carlgonz10 / 3232882912 / carl01@gmail.com"
            type="text"
            formControlName="identifier"
            name="identifier"
          >
        </div>
        <div 
          *ngIf="getFieldError('identifier')" 
          class="error-message"
        >
          {{ getFieldError('identifier') }}
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="input-label">Password</label>
        <div class="input-wrapper">
          <span class="material-symbols-outlined input-icon">lock</span>
          <input
            class="input-field input-field--password"
            placeholder="••••••••"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            name="password"
          >
          <button class="toggle-password" type="button" (click)="togglePassword()">
            <span class="material-symbols-outlined">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <div 
          *ngIf="getFieldError('password')" 
            class="error-message"
        >
          {{ getFieldError('password') }}
        </div>
      </div>

      <div class="flex justify-end">
        <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button
        class="login-btn"
        type="submit"
        [disabled]="isLoading"
        [class.login-btn--loading]="isLoading"
      >
        <span class="login-btn__shimmer"></span>
        <span class="login-btn__glow"></span>
        <span class="login-btn__content">
          <ng-container *ngIf="!isLoading">
            <span class="login-btn__text">INICIAR SESIÓN</span>
            <span class="material-symbols-outlined login-btn__icon">login</span>
          </ng-container>
          <ng-container *ngIf="isLoading">
            <mat-spinner diameter="20" color="accent"></mat-spinner>
            <span class="login-btn__text login-btn__text--loading">INICIANDO SESIÓN...</span>
          </ng-container>
        </span>
      </button>

    </form>

    <div class="mt-8 text-center">
      <p class="text-sm text-gray-600">
        No tienes cuenta?
        <a class="font-semibold text-primary register-link" href="#">Registrate aqui</a>
      </p>
    </div>

  </div>
</div>
