<div class="edit-user-page flex flex-col gap-8">

    <app-form-header eyebrow="Gestión" title="Perfil del Usuario"
        description="Gestiona la información personal del usuario" (back)="goBack()">
    </app-form-header>

    <div *ngIf="isLoading" class="flex items-center justify-center gap-3 py-16 text-[#877270] text-sm font-medium">
        <mat-spinner diameter="32"></mat-spinner>
        <span>Cargando usuario...</span>
    </div>

    <ng-container *ngIf="!isLoading && form">

        <div *ngIf="!userIsActive()"
            class="flex items-center gap-4 px-6 py-4 rounded-2xl border border-[#f5c2c2] bg-gradient-to-r from-[#fff1f1] to-[#fff8f8] shadow-[0_2px_12px_rgba(186,26,26,0.08)]">
            <div class="flex items-center justify-center w-9 h-9 rounded-full bg-[#ba1a1a]/10 shrink-0">
                <span class="material-symbols-outlined text-[1.2rem] leading-none text-[#ba1a1a]"
                    translate="no">do_not_disturb_on</span>
            </div>
            <div class="flex flex-col gap-0.5 min-w-0">
                <span class="text-[0.7rem] font-black uppercase tracking-[0.18em] text-[#ba1a1a]">Usuario
                    desactivado</span>
                <span class="text-sm text-[#7a3030] font-medium leading-snug">
                    Activa este usuario para poder editar su información.
                </span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <app-user-form-fields [formGroup]="form" [disabled]="!userIsActive()">
            </app-user-form-fields>

            <div class="profile-field state-field md:col-span-2">
                <div class="profile-field__label-row">
                    <span class="material-symbols-outlined profile-field__icon profile-field__icon--floating"
                        translate="no">
                        manage_accounts
                    </span>
                    <label class="profile-field__label-text profile-field__label-text--shifted">Estado de cuenta</label>
                </div>

                <div class="profile-field__dropdown-wrap" [class.profile-field__dropdown-wrap--open]="stateDropdownOpen"
                    [class.profile-field__dropdown-wrap--has-value]="true">

                    <button class="profile-field__dropdown-trigger" type="button" (click)="toggleStateDropdown($event)">
                        <div class="flex items-center gap-2">
                            <span class="state-field__dot" [class.state-field__dot--active]="userIsActive()"
                                [class.state-field__dot--inactive]="!userIsActive()">
                            </span>
                            <span class="state-field__trigger-label"
                                [class.state-field__trigger-label--active]="userIsActive()"
                                [class.state-field__trigger-label--inactive]="!userIsActive()">
                                {{ currentStateOption.label }}
                            </span>
                        </div>
                        <span class="material-symbols-outlined profile-field__dropdown-arrow text-[1.1rem] leading-none"
                            translate="no">expand_more</span>
                    </button>

                    <div class="profile-field__options" *ngIf="stateDropdownOpen">
                        <button *ngFor="let opt of stateOptions" class="profile-field__option state-field__option"
                            [class.state-field__option--active-item]="opt.value === true"
                            [class.state-field__option--inactive-item]="opt.value === false"
                            [class.state-field__option--selected]="opt.value === userIsActive()" type="button"
                            (click)="requestStateChange(opt.value, $event)">
                            <span class="material-symbols-outlined state-field__option-icon text-[1.1rem] leading-none"
                                translate="no">{{ opt.icon }}</span>
                            <span>{{ opt.label }}</span>
                            <span *ngIf="opt.value === userIsActive()"
                                class="material-symbols-outlined state-field__option-check text-[0.9rem] leading-none ml-auto"
                                translate="no">check</span>
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <div class="flex flex-col items-center gap-4 pb-4">
            <button class="save-btn" type="button" (click)="saveChanges()" [disabled]="isSaving || !userIsActive()">
                <span class="save-btn__shimmer"></span>
                <span class="save-btn__content">
                    <ng-container *ngIf="!isSaving">
                        <span class="material-symbols-outlined text-[1.2rem]" translate="no">save</span>
                        <span>Guardar Cambios</span>
                    </ng-container>
                    <ng-container *ngIf="isSaving">
                        <mat-spinner diameter="20" color="accent"></mat-spinner>
                        <span>Guardando...</span>
                    </ng-container>
                </span>
            </button>
        </div>

    </ng-container>

</div>
